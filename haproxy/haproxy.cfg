global
    maxconn 5000
    # Send logs to stdout for Docker to capture
    log stdout format raw local0 info
    
    stats timeout 30s
#    user haproxy
#    group haproxy
    daemon

    # SSL Configuration
    ca-base /etc/ssl/certs
    crt-base /etc/ssl/private
    ssl-default-bind-ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305:DHE-RSA-AES128-GCM-SHA256:DHE-RSA-AES256-GCM-SHA384
    ssl-default-bind-ciphersuites TLS_AES_128_GCM_SHA256:TLS_AES_256_GCM_SHA384:TLS_CHACHA20_POLY1305_SHA256
    ssl-default-bind-options ssl-min-ver TLSv1.2 no-tls-tickets

defaults
    log     global
    mode    tcp
    option  tcplog
    # option  dontlognull # Bỏ dòng này để HAProxy CÓ THỂ ghi log các kết nối bị từ chối ngay tại cửa (chưa có data)
    timeout connect 5s
    timeout client  60s
    timeout server  60s

frontend mqtt_frontend
    bind *:8883 ssl crt /etc/ssl/certs/mqtt.pem
    maxconn 2000

    # 1. Stick-table to track connection rate, current connections, byte input rate, and a penalty status (gpc0)
    stick-table type ip size 100k expire 30s store conn_rate(10s),conn_cur,bytes_in_rate(1s),gpc0
    tcp-request connection track-sc0 src

    # 2. Define ACLs for DOS protection
    acl too_many_conn  sc0_conn_cur gt 10
    acl too_fast_conn  sc0_conn_rate gt 20
    acl spam_data_rate sc0_bytes_in_rate gt 2048
    acl is_banned sc0_get_gpc0 gt 0

    # 3. Assign security tags and reject at connection phase (TCP Handshake)
    # Check if this IP is already banned due to previous spam
    tcp-request connection set-var(sess.security_tag) str(BANNED_IP) if is_banned
    tcp-request connection set-var(sess.reject_reason) str(PREVIOUS_SPAM_DETECTED) if is_banned
    # tcp-request connection reject if is_banned
    # Use silent-drop to drop packets silently without sending a TCP reset: 
    tcp-request connection silent-drop if is_banned

    # Note: We cannot check bytes_in_rate at this phase because no data has been received yet
    tcp-request connection set-var(sess.security_tag) str(SUSPICIOUS_TRAFFIC) if too_many_conn || too_fast_conn
    tcp-request connection set-var(sess.reject_reason) str(TOO_MANY_CONNS) if too_many_conn || too_fast_conn
    tcp-request connection set-var(sess.security_tag) str(VERIFIED_SAFE) if !too_many_conn !too_fast_conn !is_banned
    # tcp-request connection reject if too_many_conn || too_fast_conn

    # 4. Inspect content phase for data rate (Payload phase)
    tcp-request inspect-delay 5s
    
    # Increment the penalty counter (gpc0) so the IP gets banned for 30s
    tcp-request content sc-inc-gpc0(0) if spam_data_rate

    tcp-request content set-var(sess.security_tag) str(SUSPICIOUS_TRAFFIC) if spam_data_rate
    tcp-request content set-var(sess.reject_reason) str(SPAM_DATA_RATE) if spam_data_rate
    #tcp-request content reject if spam_data_rate
    tcp-request content reject if { var(sess.security_tag) -m str SUSPICIOUS_TRAFFIC }
    
    # Custom Log Format in English
    # %ci:%cp: Client IP:Port
    # %ft/%b/%s: Frontend/Backend/Server
    # %ts: Termination State (Important for forensics)
    log-format "%ci:%cp [%t] %ft %b/%s %ts [Security_Status: %[var(sess.security_tag)]] [Reason: %[var(sess.reject_reason)]]"

    default_backend mqtt_backend

backend mqtt_backend
    # Algorithm for balancing
    balance roundrobin
    # Forward traffic to the Mosquitto container on port 1883
    server mosquitto1 mosquitto:1883 check
    server mosquitto2 mosquitto2:1883 check

