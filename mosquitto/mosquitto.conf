# Place your local configuration in /etc/mosquitto/conf.d/
#
# A full description of the configuration file is at
# /usr/share/doc/mosquitto/examples/mosquitto.conf

#pid_file /run/mosquitto/mosquitto.pid

# --- Cấu hình chung ---
persistence true
persistence_location /mosquitto/data/
password_file /mosquitto/config/passwd

# --- Listener 1: Cổng không bảo mật (Plaintext) ---
# Dùng cho các kết nối nội bộ hoặc test không mã hóa
listener 1883 0.0.0.0
allow_anonymous false
max_connections 1000

# --- Listener 2: Cổng bảo mật (TLS/SSL) ---
# Đây là phần bổ sung để Mosquitto tự xử lý TLS
listener 8883 0.0.0.0
allow_anonymous false

# Đường dẫn đến các file chứng chỉ (phải khớp với đường dẫn TRONG container)
cafile /mosquitto/config/certs/ca.crt
certfile /mosquitto/config/certs/server.crt
keyfile /mosquitto/config/certs/server.key

# Buộc client phải sử dụng TLS phiên bản cao để an toàn (tùy chọn)
tls_version tlsv1.2

# --- Cấu hình Log (Giữ nguyên của bạn) ---
log_dest file /mosquitto/log/mosquitto.log
log_dest stdout 
log_timestamp_format %Y-%m-%d %H:%M:%S

log_type error
log_type warning
log_type notice
log_type information
